name: Security Check (REST lockdown + SSN minimization)

# Fails if the 2026-06-23 data-exposure controls regress:
#  - any public table grants anon/authenticated
#  - schema USAGE granted to a REST role
#  - the anon key can read sensitive tables
#  - a full 9-digit SSN is stored
# Runs on pushes/PRs that touch security-relevant files, and daily on a schedule.

on:
  push:
    branches: [master]
    paths:
      - 'scripts/security-*.mjs'
      - 'scripts/security-*.sql'
      - 'scripts/ai-tools-schema.sql'
      - 'scripts/lms-schema.sql'
      - 'prisma/schema.prisma'
      - 'seed-valor-from-apex.js'
      - 'lib/smartoffice/import-service.ts'
      - '.github/workflows/security-check.yml'
  pull_request:
    branches: [master]
  schedule:
    # Daily at 13:00 UTC (~8am ET) — catches dashboard/manual changes that
    # silently reopen the REST surface between deploys.
    - cron: '0 13 * * *'
  workflow_dispatch: {}

jobs:
  security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run security regression check
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run security:check
